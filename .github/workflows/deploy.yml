# Деплой MyLent на VPS при пуше в main. Без ручного SSH и git pull.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Кнопка "Run workflow" в Actions для ручного запуска

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /root/mylent
            git pull origin main
            # Set NEXT_PUBLIC_API_URL so frontend talks to the real VPS backend (not localhost)
            VPS_IP=$(curl -sf https://api.ipify.org || hostname -I | awk '{print $1}')
            grep -q "^NEXT_PUBLIC_API_URL=" .env \
              && sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=http://${VPS_IP}:8001|" .env \
              || echo "NEXT_PUBLIC_API_URL=http://${VPS_IP}:8001" >> .env
            echo "NEXT_PUBLIC_API_URL set to http://${VPS_IP}:8001"
            # Set CORS_ORIGINS so backend allows requests from the frontend origin
            grep -q "^CORS_ORIGINS=" .env \
              && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=http://${VPS_IP}:3001|" .env \
              || echo "CORS_ORIGINS=http://${VPS_IP}:3001" >> .env
            # Inject Telegram credentials from GitHub Secrets into .env
            if [ -n "${{ secrets.TELEGRAM_API_ID }}" ]; then
              grep -q "^TELEGRAM_API_ID=" .env \
                && sed -i "s|^TELEGRAM_API_ID=.*|TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}|" .env \
                || echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
            fi
            if [ -n "${{ secrets.TELEGRAM_API_HASH }}" ]; then
              grep -q "^TELEGRAM_API_HASH=" .env \
                && sed -i "s|^TELEGRAM_API_HASH=.*|TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}|" .env \
                || echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
            fi
            cd docker
            docker compose -p mylent build --quiet
            docker compose -p mylent up -d
            sleep 10
            # Restore Telegram session file from GitHub Secret (base64 encoded)
            if [ -n "${{ secrets.TELEGRAM_SESSION }}" ]; then
              printf '%s' "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > /tmp/tg.session
              TG_SIZE=$(stat -c%s /tmp/tg.session 2>/dev/null || echo 0)
              echo "Session file decoded: ${TG_SIZE} bytes"
              if [ "$TG_SIZE" -gt 1000 ]; then
                docker cp /tmp/tg.session mylent-backend-1:/app/data/telegram_session.session
                echo "Copied to backend"
                docker cp /tmp/tg.session mylent-sync-1:/app/data/telegram_session.session 2>/dev/null && echo "Copied to sync" || true
                # Verify copy inside container
                docker exec mylent-backend-1 ls -la /app/data/telegram_session.session 2>/dev/null || echo "WARNING: file not found in backend container"
                # Restart containers so they pick up fresh session
                docker restart mylent-backend-1 && echo "Backend restarted"
                docker restart mylent-sync-1 && echo "Sync restarted"
                sleep 5
              else
                echo "WARNING: session file too small (${TG_SIZE} bytes), skipping restore"
              fi
              rm -f /tmp/tg.session
            else
              echo "TELEGRAM_SESSION secret is empty — skipping session restore"
            fi
            echo "=== Container status ==="
            docker ps -a --filter "name=mylent"
            echo "=== Backend logs (last 30 lines) ==="
            docker logs mylent-backend-1 --tail 30 2>&1 || true
            echo "=== Sync logs (last 30 lines) ==="
            docker logs mylent-sync-1 --tail 30 2>&1 || true
            echo "=== Reset password ==="
            docker exec mylent-backend-1 python -m scripts.reset_password && echo "Password reset OK" || echo "Password reset FAILED"
            echo "Deploy finished. MyLent only: /root/mylent, ports 3001 8001 5433."
