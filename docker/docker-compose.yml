# MyLent — только порты 3001, 8001, 5433. Всё в /root/mylent, остальные проекты на VPS не трогаем.
name: mylent
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mylent
      POSTGRES_PASSWORD: mylent
      POSTGRES_DB: mylent
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TELEGRAM_CHANNELS: ${TELEGRAM_CHANNELS:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      # Сессия Telegram (создаётся после первого запуска telegram_sync)
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Парсер по расписанию: раз в N минут (запасной вариант, если realtime перезапустился).
  sync:
    profiles: ["disabled"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m scripts.telegram_sync_loop
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      SECRET_KEY: ${SECRET_KEY:-change-me}
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-1}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  # Реал-тайм: новые посты из каналов попадают в ленту сразу (онлайн). Отдельная сессия, чтобы не конфликтовать с sync.
  realtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m scripts.telegram_realtime
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      TELEGRAM_SESSION_PATH: /app/data/telegram_realtime
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  # AI-дайджест: генерация сводок по расписанию (8:00, 14:00, 20:00 UTC)
  digest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m scripts.digest_cron
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DIGEST_SCHEDULE_HOURS: ${DIGEST_SCHEDULE_HOURS:-8,14,20}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
