# MyLent — только порты 3001, 8001, 5433. Всё в /root/mylent, остальные проекты на VPS не трогаем.
name: mylent
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mylent
      POSTGRES_PASSWORD: mylent
      POSTGRES_DB: mylent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TELEGRAM_CHANNELS: ${TELEGRAM_CHANNELS:-}
    volumes:
      # Сессия Telegram (создаётся после первого запуска telegram_sync)
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Парсер по расписанию: раз в N минут (запасной вариант, если realtime перезапустился).
  sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m scripts.telegram_sync_loop
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      SECRET_KEY: ${SECRET_KEY:-change-me}
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-5}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  # Реал-тайм: новые посты из каналов попадают в ленту сразу (онлайн). Та же сессия, что и sync.
  realtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m scripts.telegram_realtime
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
