# Деплой MyLent на VPS при пуше в main. Без ручного SSH и git pull.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Кнопка "Run workflow" в Actions для ручного запуска

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /root/mylent
            git pull origin main

            # --- URLs: use domain with HTTPS ---
            DOMAIN="mylent.ru"
            grep -q "^NEXT_PUBLIC_API_URL=" .env \
              && sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=https://${DOMAIN}|" .env \
              || echo "NEXT_PUBLIC_API_URL=https://${DOMAIN}" >> .env
            echo "NEXT_PUBLIC_API_URL set to https://${DOMAIN}"

            grep -q "^CORS_ORIGINS=" .env \
              && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=https://${DOMAIN},https://www.${DOMAIN},http://${DOMAIN}|" .env \
              || echo "CORS_ORIGINS=https://${DOMAIN},https://www.${DOMAIN},http://${DOMAIN}" >> .env

            # Inject Telegram credentials from GitHub Secrets into .env
            if [ -n "${{ secrets.TELEGRAM_API_ID }}" ]; then
              grep -q "^TELEGRAM_API_ID=" .env \
                && sed -i "s|^TELEGRAM_API_ID=.*|TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}|" .env \
                || echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
            fi
            if [ -n "${{ secrets.TELEGRAM_API_HASH }}" ]; then
              grep -q "^TELEGRAM_API_HASH=" .env \
                && sed -i "s|^TELEGRAM_API_HASH=.*|TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}|" .env \
                || echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
            fi

            cd docker
            docker compose -p mylent build --quiet
            docker compose -p mylent up -d
            sleep 10

            # --- SSL: obtain cert if not exists ---
            if [ ! -f "/var/lib/docker/volumes/mylent_certbot_data/_data/live/mylent.ru/fullchain.pem" ]; then
              echo "=== Obtaining SSL certificate ==="
              docker compose -p mylent run --rm certbot certonly \
                --webroot --webroot-path=/var/www/certbot \
                --email artem@mylent.ru --agree-tos --no-eff-email \
                -d mylent.ru -d www.mylent.ru \
                && echo "SSL cert obtained!" \
                || echo "WARNING: SSL cert failed (will retry next deploy)"

              # Switch to SSL nginx config
              if [ -f "/var/lib/docker/volumes/mylent_certbot_data/_data/live/mylent.ru/fullchain.pem" ]; then
                cp /root/mylent/docker/nginx-ssl.conf /root/mylent/docker/nginx.conf
                docker compose -p mylent restart nginx
                echo "Nginx switched to HTTPS"
              fi
            else
              echo "SSL cert already exists"
              # Make sure we're using the SSL config
              cp /root/mylent/docker/nginx-ssl.conf /root/mylent/docker/nginx.conf
              docker compose -p mylent restart nginx
            fi

            # Restore Telegram session file from GitHub Secret (base64 encoded)
            if [ -n "${{ secrets.TELEGRAM_SESSION }}" ]; then
              printf '%s' "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > /tmp/tg.session
              TG_SIZE=$(stat -c%s /tmp/tg.session 2>/dev/null || echo 0)
              echo "Session file decoded: ${TG_SIZE} bytes"
              if [ "$TG_SIZE" -gt 1000 ]; then
                # Copy session for backend and sync (shared path)
                docker cp /tmp/tg.session mylent-backend-1:/app/data/telegram_session.session
                echo "Copied to backend"
                docker cp /tmp/tg.session mylent-sync-1:/app/data/telegram_session.session 2>/dev/null && echo "Copied to sync" || true
                # Copy session for realtime (separate path to avoid SQLite lock conflicts)
                docker cp /tmp/tg.session mylent-realtime-1:/app/data/telegram_realtime.session 2>/dev/null && echo "Copied to realtime" || true
                # Verify copies
                docker exec mylent-backend-1 ls -la /app/data/telegram_session.session 2>/dev/null || echo "WARNING: session not found in backend"
                docker exec mylent-realtime-1 ls -la /app/data/telegram_realtime.session 2>/dev/null || echo "WARNING: session not found in realtime"
                # Restart all Telegram-dependent containers
                docker restart mylent-backend-1 && echo "Backend restarted"
                docker restart mylent-sync-1 && echo "Sync restarted"
                docker restart mylent-realtime-1 && echo "Realtime restarted"
                sleep 5
              else
                echo "WARNING: session file too small (${TG_SIZE} bytes), skipping restore"
              fi
              rm -f /tmp/tg.session
            else
              echo "TELEGRAM_SESSION secret is empty — skipping session restore"
            fi

            echo "=== Container status ==="
            docker ps -a --filter "name=mylent"
            echo "=== Backend logs (last 30 lines) ==="
            docker logs mylent-backend-1 --tail 30 2>&1 || true
            echo "=== Sync logs (last 30 lines) ==="
            docker logs mylent-sync-1 --tail 30 2>&1 || true
            echo "=== Realtime logs (last 30 lines) ==="
            docker logs mylent-realtime-1 --tail 30 2>&1 || true
            echo "=== Nginx logs (last 10 lines) ==="
            docker logs mylent-nginx-1 --tail 10 2>&1 || true
            echo "=== Reset password ==="
            docker exec mylent-backend-1 python -m scripts.reset_password && echo "Password reset OK" || echo "Password reset FAILED"
            echo "Deploy finished. MyLent: https://mylent.ru"
