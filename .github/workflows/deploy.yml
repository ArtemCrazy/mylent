# Деплой MyLent на VPS при пуше в main. Без ручного SSH и git pull.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /root/mylent
            git pull origin main

            DOMAIN="mylent.ru"
            # Empty API URL = relative calls via nginx (works with both HTTP and HTTPS)
            grep -q "^NEXT_PUBLIC_API_URL=" .env && sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=|" .env || echo "NEXT_PUBLIC_API_URL=" >> .env
            echo "NEXT_PUBLIC_API_URL set to empty (relative)"
            grep -q "^CORS_ORIGINS=" .env && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=https://${DOMAIN},https://www.${DOMAIN},http://${DOMAIN}|" .env || echo "CORS_ORIGINS=https://${DOMAIN},https://www.${DOMAIN},http://${DOMAIN}" >> .env

            if [ -n "${{ secrets.TELEGRAM_API_ID }}" ]; then
              grep -q "^TELEGRAM_API_ID=" .env && sed -i "s|^TELEGRAM_API_ID=.*|TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}|" .env || echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
            fi
            if [ -n "${{ secrets.TELEGRAM_API_HASH }}" ]; then
              grep -q "^TELEGRAM_API_HASH=" .env && sed -i "s|^TELEGRAM_API_HASH=.*|TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}|" .env || echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
            fi

            cd docker
            docker compose -p mylent build --quiet
            docker compose -p mylent up -d
            sleep 10

            docker rm -f mylent-nginx-1 2>/dev/null || true
            docker rm -f mylent-certbot-1 2>/dev/null || true

            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              apt-get update -qq && apt-get install -y -qq nginx
            fi
            if ! command -v certbot &>/dev/null; then
              echo "Installing certbot..."
              apt-get update -qq && apt-get install -y -qq certbot python3-certbot-nginx
            fi

            rm -f /etc/nginx/sites-enabled/default

            # Always start with HTTP config (guaranteed to work)
            cp /root/mylent/docker/nginx-http.conf /etc/nginx/sites-available/mylent.conf
            ln -sf /etc/nginx/sites-available/mylent.conf /etc/nginx/sites-enabled/mylent.conf
            nginx -t && systemctl reload nginx
            echo "HTTP nginx configured"

            # Try to get SSL cert if missing
            mkdir -p /var/www/html
            if [ ! -f /etc/letsencrypt/live/mylent.ru/fullchain.pem ]; then
              echo "=== Getting SSL certificate ==="
              certbot certonly --webroot --webroot-path=/var/www/html --email artem@mylent.ru --agree-tos --no-eff-email -d mylent.ru -d www.mylent.ru && echo "SSL cert obtained!" || echo "WARNING: SSL cert failed, staying on HTTP"
            fi

            # If valid cert exists, upgrade to SSL config (HTTP still works, no redirect)
            if [ -f /etc/letsencrypt/live/mylent.ru/fullchain.pem ]; then
              echo "Enabling HTTPS (no redirect from HTTP)"
              cp /root/mylent/docker/nginx-ssl.conf /etc/nginx/sites-available/mylent.conf
              nginx -t && systemctl reload nginx && echo "HTTPS enabled" || echo "SSL config failed, keeping HTTP"
            fi

            if [ -n "${{ secrets.TELEGRAM_SESSION }}" ]; then
              printf '%s' "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > /tmp/tg.session
              TG_SIZE=$(stat -c%s /tmp/tg.session 2>/dev/null || echo 0)
              echo "Session file decoded: ${TG_SIZE} bytes"
              if [ "$TG_SIZE" -gt 1000 ]; then
                docker cp /tmp/tg.session mylent-backend-1:/app/data/telegram_session.session
                echo "Copied to backend"
                docker cp /tmp/tg.session mylent-sync-1:/app/data/telegram_session.session 2>/dev/null && echo "Copied to sync" || true
                docker cp /tmp/tg.session mylent-realtime-1:/app/data/telegram_realtime.session 2>/dev/null && echo "Copied to realtime" || true
                docker restart mylent-backend-1 && echo "Backend restarted"
                docker restart mylent-sync-1 && echo "Sync restarted"
                docker restart mylent-realtime-1 && echo "Realtime restarted"
                sleep 5
              else
                echo "WARNING: session file too small (${TG_SIZE} bytes), skipping"
              fi
              rm -f /tmp/tg.session
            fi

            echo "=== Container status ==="
            docker ps -a --filter "name=mylent"
            echo "=== Backend logs (last 20 lines) ==="
            docker logs mylent-backend-1 --tail 20 2>&1 || true
            echo "=== Sync logs (last 20 lines) ==="
            docker logs mylent-sync-1 --tail 20 2>&1 || true
            echo "=== Reset password ==="
            docker exec mylent-backend-1 python -m scripts.reset_password && echo "Password reset OK" || echo "Password reset FAILED"
            echo "Deploy finished. MyLent: https://mylent.ru"
