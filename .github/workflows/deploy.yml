# Деплой MyLent на VPS при пуше в main. Без ручного SSH и git pull.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Кнопка "Run workflow" в Actions для ручного запуска

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /root/mylent
            git pull origin main
            cd docker
            docker compose -p mylent build --quiet
            docker compose -p mylent up -d
            sleep 8
            docker exec mylent-backend-1 python -c "
from app.core.security import get_password_hash
from app.core.database import Base
from app.models.user import User
from sqlalchemy import create_engine, select
from sqlalchemy.orm import sessionmaker
import os
url = os.environ.get('DATABASE_URL_SYNC') or os.environ.get('DATABASE_URL','').replace('+asyncpg','')
s = sessionmaker(bind=create_engine(url))()
u = s.execute(select(User)).scalars().first()
if u:
    u.email='crazy@mylent.local'; u.password_hash=get_password_hash('crazy'); s.commit(); print('OK')
else:
    print('NO USER')
s.close()
" && echo "Password reset OK" || echo "Password reset FAILED"
            echo "Deploy finished. MyLent only: /root/mylent, ports 3001 8001 5433."
