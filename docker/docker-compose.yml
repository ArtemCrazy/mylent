# MyLent — только порты 3001, 8001, 5433. Всё в /root/mylent, остальные проекты на VPS не трогаем.
name: mylent
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mylent
      POSTGRES_PASSWORD: mylent
      POSTGRES_DB: mylent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mylent:mylent@postgres:5432/mylent
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TELEGRAM_SESSION_PATH: /app/data/telegram_session
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      # Сессия Telegram (создаётся после первого запуска telegram_sync)
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
