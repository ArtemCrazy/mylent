# Деплой MyLent на VPS при пуше в main. Без ручного SSH и git pull.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Кнопка "Run workflow" в Actions для ручного запуска

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /root/mylent
            git pull origin main
            cd docker
            docker compose -p mylent build --quiet
            docker compose -p mylent up -d
            sleep 5
            docker exec mylent-backend-1 python -c "
import sys; sys.path.insert(0, '/app')
from sqlalchemy import create_engine, select
from sqlalchemy.orm import sessionmaker
from app.core.config import get_settings
from app.core.security import get_password_hash
from app.models.user import User
settings = get_settings()
url = settings.database_url_sync or settings.database_url.replace('+asyncpg','')
engine = create_engine(url)
s = sessionmaker(bind=engine)()
user = s.execute(select(User)).scalars().first()
if user:
    user.email = 'crazy@mylent.local'
    user.password_hash = get_password_hash('crazy')
    s.commit()
    print('Password updated for:', user.email)
s.close()
" || true
            echo "Deploy finished. MyLent only: /root/mylent, ports 3001 8001 5433."
